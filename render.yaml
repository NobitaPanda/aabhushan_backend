services:
  - type: web
    name: aabhushan-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OWNER_PASSWORD
        value: owner@123
      - key: MANAGER_PASSWORD
        value: manager@123
      - key: INVENTORY_PASSWORD
        value: inventory@123
      - key: MANUFACTURING_PASSWORD
        value: manufacturing@123
      - key: SALES_PASSWORD
        value: sales@123
      - key: KARIGAR_PASSWORD
        value: karigar@123
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
